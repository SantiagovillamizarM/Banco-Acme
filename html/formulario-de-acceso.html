<!--Lo necesario para que el HTML funcione-->
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in</title>
    
    <!--Link necesario para que aparezca el favicon (detalles de fina coqueteria)-->
    <!--el favicon se encuentra en la carpeta "assets"-->
    <link rel="icon" type="image/png" href="../assets/favicon-sin-fondo.png">

    <!--Link para conectar el CSS con el HTML (Los CSS tienen los nombres de los html + style + el .css)-->
    <link rel="stylesheet" href="../style/login-style.css">
</head>

<body>

    <!--Div que contiene todo para poder modificar las cosasmas facilmente con el ID asignado de "todo-login"-->
    <div id="todo-login">

        <!--h1 con el nombre de la empresa con el ID asignado de "titulo-login"-->
        <h1 id="titulo-login">Acme</h1>


        <!--div que contiene los botones con el ID asignado de "botones-login"-->
        <div id="botones-login">

            <!--a que lleva al login.html con el ID asignado de "a1-login"-->
            <a href="login.html" id="a1-login">

            <!--boton que lleva al login.html con el ID asignado de "boton-login"-->
            <button id="boton-login">Log in</button>
            </a>


            <!--a que lleva a la fase 1 del register con el ID asignado de "a2-login"-->
            <a href="Register/Register_fase1.html" id="a2-login">

            <!--boton para ir al register fase 1 con el ID asignado de "boton-register/login"-->   
            <button id="boton-register/login">Register</button>
            </a>
        </div>
    </div>
</body>
</html>
