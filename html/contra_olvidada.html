<!--Lo necesario para que el HTML funcione-->
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contraseña</title>

    <!--Link necesario para que aparezca el favicon (detalles de fina coqueteria)-->
    <!--el favicon se encuentra en la carpeta "assets"-->
    <link rel="icon" type="image/png" href="../assets/favicon-sin-fondo.png">

    <!--Link para conectar el CSS con el HTML (Los CSS tienen los nombres de los html + style + el .css)-->
    <link rel="stylesheet" href="../style/contraseña-olvidada-style.css">

    <!--Link entre el HTML y el JS junto con el defer(descarga el archivo JavaScript mientras arma la página, pero solo lo ejecuta cuando la página ya está lista)-->
    <script src="../scripts/contra_olvidada.js" defer></script>
</head>

<body>

    <!--Div que contiene todo para poder modificar las cosasmas facilmente-->
    <div id="todo-recuperar">

        <!--h1 con el nombre de la empresa con el ID asignado de "titulo-recuperar"-->
        <h1 id="titulo-recuperar">Acme</h1>


        <!--form con el ID asignado de "form-recuperar"-->
        <form id="form-recuperar">


            <!--label para la cedula del apartado de recuperar con el ID asignado de "label-cedula-recuperar"-->
            <label for="cedula-recuperar" id="label-cedula-recuperar">Documento</label>

            <!--input para poner esa cedula del tipo number con el ID asignado de "cedula-recuperar" del tipo required-->
            <input type="number" id="cedula-recuperar" placeholder="Ej: 1234567" required>


            <!--label para recuperar el correo con la ID asignada de "label-correo-recuperar"-->
            <label for="correo-recuperar" id="label-correo-recuperar">Correo electrónico</label>

            <!--input para poner el correo de recuperacion con el ID asignado de "correo-recuperar" del tipo required-->
            <input type="email" id="correo-recuperar" placeholder="ejemplo@correo.com" required>


            <!--boton para subir todo-->
            <button type="submit" id="boton-recuperar">Continuar</button>

            <!--p para poner el mensaje de error con el ID asignado de "mensaje-error-recuperar"-->
            <p id="mensaje-error-recuperar"></p>


            <!--a para volver al login con el ID asignado de "volver-recuperar"-->
            <a href="login.html" id="volver-recuperar">← Volver al inicio de sesión</a>

        </form>
    </div>
</body>
</html>
