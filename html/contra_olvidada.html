<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contraseña olvidada</title>
    <link rel="icon" type="image/png" href="../assets/favicon-sin-fondo.png">
</head>
<body>
    <h1>Acme</h1>
    <h2>Recuperar contraseña</h2>
    <form>
        <label for="Documento_guardado">Documento:</label>
        <input type="number" id="cedula_recuperacion" name="cedula_recuperacion" placeholder="Ej: 1.234.567 o 1234567" pattern="[0-9.]+"  title="Solo números y puntos" minlength="6" maxlength="12"  required>

        <label for="correo">Correo electrónico</label>
        <input type="email" id="correo_recuperacion" name="correo" placeholder="ejemplo@correo.com" required>
    </form>
    
</body>
</html>
