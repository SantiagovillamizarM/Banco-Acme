<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="icon" type="image/png" href="../../assets/favicon-sin-fondo.png">
    <link rel="stylesheet" href="../../style/registro-style.css">
    <script src="../../scripts/registro.js" defer></script>
</head>
<body>
    <div id="todo-registro">
 
        <h1 id="titulo-registro">Acme</h1>
        <h2 id="subtitulo-registro">Registro</h2>
 
        <form id="form-registro">
 
            <label for="tipoDoc" id="label-tipo-registro">Tipo de identificación</label>
            <select id="seleccion-registro" name="tipoDoc" required>
                <option value="">Seleccione una opción</option>
                <option value="CC">Cédula de ciudadanía</option>
                <option value="TI">Tarjeta de identidad</option>
            </select>
 
            <label for="cedula" id="label-documento-registro">Número de documento</label>
            <input type="number" id="cedula-registro" name="cedula" placeholder="Ej: 1234567" minlength="6" maxlength="12" required>
            
            
            <button type="submit" id="boton-siguiente-registro">Siguiente</button>
            
 
        </form>
 
    </div>
</body>
</html>
