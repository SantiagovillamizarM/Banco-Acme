<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Fase 1</title>
    <link rel="icon" type="image/png" href="../../assets/favicon-sin-fondo.png">
    <link rel="stylesheet" href="../../style/registro-fase1-style.css">
</head>
<body>
    <div id="todo-fase1">

        <h1 id="titulo-fase1">Acme</h1>
        <h2 id="subtitulo-fase1">Registro</h2>
        <h3 id="paso-fase1">Datos personales</h3>

        <form id="form-fase1">

            <label for="primerNombre" id="label-primer-nombre">Primer nombre</label>
            <input type="text" id="primer-nombre-fase1" name="primerNombre" placeholder="Ej: Juan" required>

            <label for="segundoNombre" id="label-segundo-nombre">Segundo nombre</label>
            <input type="text" id="segundo-nombre-fase1" name="segundoNombre" placeholder="Ej: Carlos">

            <label for="apellidos" id="label-apellidos">Apellidos</label>
            <input type="text" id="apellidos-fase1" name="apellidos" placeholder="Ej: Pérez Gómez" required>

            <label for="genero" id="label-genero">Género</label>
            <select id="genero-fase1" name="genero" required>
                <option value="">Seleccione una opción</option>
                <option value="M">Masculino</option>
                <option value="F">Femenino</option>
                <option value="O">Prefiero no decirlo</option>
            </select>

            <label for="contrasena" id="label-contrasena">Contraseña</label>
            <input type="password" id="contrasena-fase1" name="contrasena" placeholder="Ingrese su contraseña" required>

            <label for="confirmarContrasena" id="label-confirmar-contrasena">Confirmar contraseña</label>
            <input type="password" id="confirmar-contrasena-fase1" name="confirmarContrasena" placeholder="Repita su contraseña" required>

            <button type="submit" id="boton-siguiente-fase1">Siguiente</button>

        </form>

    </div>
</body>
</html>
