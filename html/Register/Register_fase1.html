<!--Lo necesario para que el HTML funcione-->
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>

    <!--Link necesario para que aparezca el favicon (detalles de fina coqueteria)-->
    <!--el favicon se encuentra en la carpeta "assets"-->
    <link rel="icon" type="image/png" href="../../assets/favicon-sin-fondo.png">

    <!--Link para conectar el CSS con el HTML (Los CSS tienen los nombres de los html + style + el .css)-->
    <link rel="stylesheet" href="../../style/registro-style.css">

    <!--Link entre el HTML y el JS junto con el defer(descarga el archivo JavaScript mientras arma la página, pero solo lo ejecuta cuando la página ya está lista)-->
    <script src="../../scripts/registro.js" defer></script>
</head>

<body>

    <!--Div que contiene todo para poder modificar las cosasmas facilmente identificado con el id "todo-registro"-->
    <div id="todo-registro">
        
        <!--h1 que contiene el nombre del banco (Acme) con el ID de "titulo-registro"-->
        <h1 id="titulo-registro">Acme</h1>

        <!--h2 que contiene el subtitulo "Registro" como forma decorativa con el ID de "subtitulo-registro"-->
        <h2 id="subtitulo-registro">Registro</h2>
 

        <!--form (formulario) con el ID de "form-registro"-->
        <form id="form-registro">
 

            <!--Label (Se usa para dar etiquetas a los diferentes apartados del forms) junto con su ID llamada "label-tipo-registro"-->
            <label for="tipoDoc" id="label-tipo-registro">Tipo de identificación</label>

            <!--select (se usa para poner una lista de selecciones) con su ID "seleccion-registro" que es de tipo "required" (requerido/obligatorio)-->
            <select id="seleccion-registro" name="tipoDoc" required>
                
                <option value="">Seleccione una opción</option>
                <!--Opcion con el valor CC (Cedula Ciudadana)-->
                <option value="CC">Cédula de ciudadanía</option>

                <!--Opcion donde aparece TI (Tarjeta de identidad)-->
                <option value="TI">Tarjeta de identidad</option>
            </select>
 
            <!--Label para la cedula con el ID asignado de "laabel-documento-registro"-->
            <label for="cedula" id="label-documento-registro">Número de documento</label>

            <!--Input (Ingresar datos) con el ID asignado de "cedula-registro" de nombre "cedula" con caracteres minimos de 6 y maximo 12 y del tipo "number" (solo ingresa numeros)-->
            <input type="number" id="cedula-registro" name="cedula" placeholder="Ej: 1234567" minlength="6" maxlength="12" required>
            
            <!--Boton para subir lo hecho en el formulario con el ID asignado de "boton-siguiente-registro"-->
            <button type="submit" id="boton-siguiente-registro">Siguiente</button>
        </form>
    </div> 
    
</body>
</html>
