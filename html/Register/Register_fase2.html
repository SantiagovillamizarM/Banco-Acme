<!--Lo necesario para que el HTML funcione-->
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>

    <!--Link necesario para que aparezca el favicon (detalles de fina coqueteria)-->
    <!--el favicon se encuentra en la carpeta "assets"-->
    <link rel="icon" type="image/png" href="../../assets/favicon-sin-fondo.png">

    <!--Link para conectar el CSS con el HTML (Los CSS tienen los nombres de los html + style + el .css)-->
    <link rel="stylesheet" href="../../style/registro-fase1-style.css">

    <!--Link entre el HTML y el JS junto con el defer(descarga el archivo JavaScript mientras arma la página, pero solo lo ejecuta cuando la página ya está lista)-->
    <script src="../../scripts/registro-fase2.js" defer></script>
</head>

<body>

    <!--Div que contiene todo para poder modificar las cosasmas facilmente con el ID asignado de "todo-fase1"-->
    <div id="todo-fase1">

        <!--h1 con el nombre del banco con el ID asignado de "titulo-fase1"-->
        <h1 id="titulo-fase1">Acme</h1>

        <!--h2 agregado de forma decorativa con ID asignado de "subtitulo-fase1"-->
        <h2 id="subtitulo-fase1">Registro</h2>

        <!--h3 agregado de forma decorativa con el ID asignado de "paso-fase1"-->
        <h3 id="paso-fase1">Datos personales</h3>

        <!--form con el ID asignado de "form-fase1"-->
        <form id="form-fase1">

            <!--Label para el primer nombre del usuario con el ID asignado de "label-primer-nombre"-->
            <label for="primerNombre" id="label-primer-nombre">Primer nombre</label>

            <!--el input en donde el usuario pone su primer nombre con el ID asignado de "primer-nombre-fase1" y de tipo required-->
            <input type="text" id="primer-nombre-fase1" name="primerNombre" placeholder="Ej: Juan" required>


            <!--label para el segundo nombre (si aplica) con el ID asignado de "label-segundo-nombre"-->
            <label for="segundoNombre" id="label-segundo-nombre">Segundo nombre</label>

            <!--Input para ingresar ese segundo nombre del tipo required y con el ID asignado de "segundo-nombre-fase1"-->
            <input type="text" id="segundo-nombre-fase1" name="segundoNombre" placeholder="Ej: Carlos">


            <!--Label para los apellidos con el ID asignado de "label-apellidos"-->
            <label for="apellidos" id="label-apellidos">Apellidos</label>

            <!--Input para ingresar esos apellidos del tipo required con el ID aginado de "apellidos-fase1"-->
            <input type="text" id="apellidos-fase1" name="apellidos" placeholder="Ej: Pérez Gómez" required>


            <!--Label para el genero con el ID asignado de "label-genero"-->
            <label for="genero" id="label-genero">Género</label>

            <!--seleccion multiple con el ID asignado de "genero-fase1" del tipo required-->
            <select id="genero-fase1" name="genero" required>
                <option value="">Seleccione una opción</option>

                <!--opcion con el valor M de masculino-->
                <option value="M">Masculino</option>

                <!--opcion con el valor F de femenino-->
                <option value="F">Femenino</option>

                <!--opcion O de otro para el prefiero no decirlo-->
                <option value="O">Prefiero no decirlo</option>
            </select>


            <!--Label para la contraseña con el id asignado de "label-contraseña"-->
            <label for="contrasena" id="label-contrasena">Contraseña</label>

            <!--Input para ingresar esa contraseña del tipo password para que no sea visible con el ID asignado de "contrasena-fase1" del tipo required-->
            <input type="password" id="contrasena-fase1" name="contrasena" placeholder="Ingrese su contraseña" required>


            <!--Label para confirmar la contraseña con el ID asignado de "label-confirmar-contraseña"-->
            <label for="confirmarContrasena" id="label-confirmar-contrasena">Confirmar contraseña</label>

            <!--Input para ingresar esa confirmacion de la contraseña del tipo required con el ID asignado de "confirmar-contrasena-fase1"-->
            <input type="password" id="confirmar-contrasena-fase1" name="confirmarContrasena" placeholder="Repita su contraseña" required>


            <!--boton para subir la informacion con el ID asignado de "boton-siguiente-fase1"-->
            <button type="submit" id="boton-siguiente-fase1">Siguiente</button>
        </form>
    </div>
</body>
</html>
