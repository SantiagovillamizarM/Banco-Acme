<!--Lo necesario para que el HTML funcione-->
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Fase 3</title>

    <!--Link necesario para que aparezca el favicon (detalles de fina coqueteria)-->
    <!--el favicon se encuentra en la carpeta "assets"-->
    <link rel="icon" type="image/png" href="../../assets/favicon-sin-fondo.png">

    <!--Link para conectar el CSS con el HTML (Los CSS tienen los nombres de los html + style + el .css)-->
    <link rel="stylesheet" href="../../style/registro-fase3-style.css">

    <!--Link entre el HTML y el JS junto con el defer(descarga el archivo JavaScript mientras arma la página, pero solo lo ejecuta cuando la página ya está lista)-->
    <script src="../../scripts/registro-fase3.js" defer></script>
</head>

<body>

    <!--Div que contiene todo para poder modificar las cosasmas facilmente con el ID asignado de "todo-fase3"-->
    <div id="todo-fase3">

        <!--h1 con el nombre del banco-->
        <h1 id="titulo-fase3">Acme</h1>

        <!--div con el id asignado de "subtitulos-fase3"-->
        <div id="subtitulos-fase3">

            <!--p que contiene de forma decorativa la palabra registro con el ID asignado de "registro-texto-fase3"-->
            <p id="registro-texto-fase3">Registro</p>

            <!--p que contiene de forma decorativa las palabras datos de contacto con el ID asignado de "contacto-texto-fase3"-->
            <p id="contacto-texto-fase3">Datos de contacto</p>
        </div>

        <!--form con el ID asignado de "form-fase3"-->
        <form id="form-fase3">

            <!--label para el correo de la fase 3 con el ID asignado de "label-correo-fase3"-->
            <label for="correo-fase3" id="label-correo-fase3">Correo electrónico</label>

            <!--input para ese correo del tipo email con el ID asignado de "correo-fase3" del tipo required-->
            <input type="email" id="correo-fase3" name="correo" placeholder="Ej: juan@correo.com" required>


            <!--label para el telefono en la fase 3 con el ID asignado de "label-telefono-fase3"-->
            <label for="telefono-fase3" id="label-telefono-fase3">Teléfono</label>

            <!--input para ese telefono del tipo tel (para telefonos) con el ID asignado de "telefono-fase3" del tipo required-->
            <input type="tel" id="telefono-fase3" name="telefono" placeholder="Ej: 3001234567" maxlength="10" required>


            <!--label para la direccion con el ID asignado de "label-direccion-fase3"-->
            <label for="direccion-fase3" id="label-direccion-fase3">Dirección de residencia</label>

            <!--input para esa direccion del tipo texto con el ID asignado de "direccion-fase3" del tipo required-->
            <input type="text" id="direccion-fase3" name="direccion" placeholder="Ej: Calle 123 # 67-67" required>


            <!--Label para la ciudad con el ID asignado de "label-ciudad-fase3"-->
            <label for="ciudad-fase3" id="label-ciudad-fase3">Ciudad</label>

            <!--input para ingresar esa ciudad con el ID asignado de "ciudad-fase3" del tipo required-->
            <input type="text" id="ciudad-fase3" name="ciudad" placeholder="Ej: Bogotá" required>

            <!--boton para subir todo con el ID asignado de "boton-crear-fase3"-->
            <button type="submit" id="boton-crear-fase3">Crear cuenta</button>
        </form>
    </div>
</body>
</html>
