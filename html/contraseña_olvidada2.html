<!--Lo necesario para que el HTML funcione-->
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva contraseña</title>

    <!--Link necesario para que aparezca el favicon (detalles de fina coqueteria)-->
    <!--el favicon se encuentra en la carpeta "assets"-->
    <link rel="icon" type="image/png" href="../assets/favicon-sin-fondo.png">

    <!--Link para conectar el CSS con el HTML (Los CSS tienen los nombres de los html + style + el .css)-->
    <link rel="stylesheet" href="../style/contraseña-olvidada2-style.css">

    <!--Link entre el HTML y el JS junto con el defer(descarga el archivo JavaScript mientras arma la página, pero solo lo ejecuta cuando la página ya está lista)-->
    <script src="../scripts/contraseña_olvidada2.js" defer></script>
</head>

<body>

    <!--Div que contiene todo para poder modificar las cosasmas facilmente con el ID asignado de "todo-recuperar"-->
    <div id="todo-recuperar">

        <!--h1 con el nombre de la empresa con el ID asignado de "titulo-recuperar"-->
        <h1 id="titulo-recuperar">Acme</h1>


        <!--form para poner la contraseña nueva con el ID asignado de "form-nueva-contrasena"-->
        <form id="form-nueva-contrasena">


            <!--label para la contraseña nueva con el ID asignado de "label-nueva-contrasena"-->
            <label for="contrasena-nueva" id="label-nueva-contrasena">Contraseña nueva</label>

            <!--input del tipo contraseña con el id asignado de "contraseña-nueva" del tipo required-->
            <input type="password" id="contrasena-nueva" placeholder="Mínimo 6 caracteres" required>


            <!--label para confirmar la contraseña con el ID asignado de "label-confirmar-contrasena"-->
            <label for="contrasena-confirmar" id="label-confirmar-contrasena">Confirmar contraseña</label>

            <!--input del tipo contraseña con el DI asignado de "contrasena-confirmar" del tipo required-->
            <input type="password" id="contrasena-confirmar" placeholder="Repite tu contraseña" required>


            <!--boton para sabir todo con el ID asignado de "boton-recuperar"-->
            <button type="submit" id="boton-recuperar">Guardar contraseña</button>

            <!--apartado por si los datos estan incorrectos con el ID asignado de "mensaje-error-recuperar"-->
            <p id="mensaje-error-recuperar"></p>

            <!--a para volver al login con el ID asignado de "volver-recuperar"-->
            <a href="login.html" id="volver-recuperar">← Volver al inicio de sesión</a>
        </form>
    </div>
</body>
</html>
